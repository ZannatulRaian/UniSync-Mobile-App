name: unisync
description: UniSync
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.6.1

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Offline-First Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Network connectivity monitoring
  connectivity_plus: ^6.1.1

  # Firebase (REQUIRED for OneSignal + Android Push Notifications)
  firebase_core: ^3.2.0
  firebase_messaging: ^15.1.0

  # Push Notifications — OneSignal (requires Firebase)
  onesignal_flutter: ^5.2.5

  # UI
  google_fonts: ^6.3.3
  table_calendar: ^3.1.3
  smooth_page_indicator: ^1.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # File handling
  file_picker: ^8.3.7
  image_picker: ^1.1.2
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.3
  timeago: ^3.7.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/background.jpg
    - assets/images/logo.png
