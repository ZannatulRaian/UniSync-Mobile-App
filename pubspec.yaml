name: unisync
description: UniSync
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (replaces ALL Firebase packages)
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.6.1

  # UI
  google_fonts: ^6.3.3
  table_calendar: ^3.1.3
  smooth_page_indicator: ^1.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # File handling
  file_picker: ^8.3.7
  image_picker: ^1.1.2
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  path: ^1.9.0
  timeago: ^3.7.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/background.jpg
    - assets/images/logo.png
