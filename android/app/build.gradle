plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.unisync.unisync"
    compileSdk 36           // must be 36+ — plugin deps (androidx.core 1.17, activity 1.12) require it
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17  // required by AGP 8.9.1 + Gradle 8.11.1
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.unisync.unisync"
        minSdk 26           // Android 8.0 — minimum for all Pixel 7 supported OS versions
        targetSdk 34        // Android 14 — Pixel 7 target (compileSdk >= targetSdk is fine)
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

// No explicit kotlin-stdlib needed — Kotlin 2.1 bundles it automatically
