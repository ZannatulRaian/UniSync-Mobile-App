org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Disable cross-drive Kotlin incremental cache (fixes "different roots" error on Windows
# when Flutter SDK is on C:\ and project is on F:\)
kotlin.incremental=false
# Suppress obsolete Java 8 source/target warnings from any remaining transitive deps
kotlin.jvm.target.validation.mode=warning
# Faster Gradle daemon startup
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
